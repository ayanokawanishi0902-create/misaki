	<!-- ＊＊＊＊＊＊＊＊＊＊＊＊お問い合わせ＊＊＊＊＊＊＊＊＊＊＊＊ -->
	<main id="contact">

		<section class="contact-section">
			<div class="contact-wrapper">
				<h2 class="font-gowun">CONTACT</h2>
				<p class="section-subtitle">
					制作のご依頼・お見積りのご相談など、お気軽にお問い合わせください。
				</p>

				<form action="https://ssgform.com/s/uhDxAMWnnEDJ" method="post" class="contact-form">
					
					<div class="form-group">
						<label for="company">会社名</label>
						<input type="text" id="company" name="会社名" placeholder="例：株式会社○○○">
					</div>

					<div class="form-group">
						<label for="name">お名前（ご担当者）<span>必須</span></label>
						<input type="text" id="name" name="お名前" placeholder="例：鈴木 太郎" required>
					</div>

					<div class="form-group">
						<label for="email">メールアドレス<span>必須</span></label>
						<input type="email" id="email" name="メールアドレス" placeholder="example@mail.com" required>
					</div>

					<div class="form-group">
						<label for="type">お問い合わせ内容<span>必須</span></label>
						<select id="type" name="お問い合わせ種類" required>
							<option value="">選択してください</option>
							<option value="グッズ">グッズデザインのご相談</option>
							<option value="販促物">販促物デザインのご相談</option>
							<option value="イラスト">イラスト制作のご相談</option>
							<option value="ロゴ">ロゴデザインのご相談</option>
							<option value="その他">その他</option>
						</select>
					</div>

					<div class="form-group">
						<label for="message">メッセージ本文</label>
						<textarea id="message" name="内容" rows="6" placeholder="ご自由にご入力ください"></textarea>
					</div>

					<div class="form-agreement">
						<input type="checkbox" id="agree" name="同意" required>
						<label for="agree">
							<a href="privacy.html" target="_blank" rel="noopener noreferrer">プライバシーポリシー</a>に同意する
						</label>
					</div>
								
					<div class="form-submit">
						<button type="submit" class="submit-btn font-shippori">この内容で送信する</button>
					</div>
					
					<p class="form-note">
						※通常2〜3営業日以内にご返信いたします。<br>
						※3日以上経過しても返信がない場合は、メールの不達の可能性がございます。<br>
						お手数ですが再度お問い合わせいただくか、SNS等よりご連絡ください。
					</p>

				</form>
			</div>
		</section>
	</main>
